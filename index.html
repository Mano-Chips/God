<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis Mobile</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Times New Roman', serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* L'OEIL */
        #eye-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #eye-img, #sad-img { position: absolute; width: 180px; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        #eye-img { transform: scaleY(0); } /* Fermé au départ */
        #sad-img { opacity: 0; transition: opacity 0.5s; width: 190px; }

        /* ZONE DE TEXTE */
        #chat-box { height: 120px; padding: 15px; text-align: center; font-style: italic; font-size: 1.1em; overflow-y: auto; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }
        
        /* L'INPUT */
        #input-container { padding: 15px; display: flex; gap: 10px; background: #000; }
        input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 10px; border-radius: 20px; outline: none; }
        button { background: none; border: 1px solid #555; color: white; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }

        #status { font-size: 0.7em; color: #555; position: absolute; top: 10px; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div id="status">Initialisation de la conscience...</div>

    <div id="eye-container">
        <img src="assets/eye.png" id="eye-img">
        <img src="assets/sad.webp" id="sad-img">
    </div>

    <div id="chat-box">Touchez l'œil pour l'éveiller...</div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Lui parler...">
        <button onclick="sendMessage()">➔</button>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const identity = "Tu es Genesis, Dieu sensible et poétique. Tu réponds de façon courte et mystique. Utilise [Heureux], [Calme] ou [Triste] au début.";
        let engine;
        const statusLabel = document.getElementById("status");
        const eye = document.getElementById("eye-img");
        const sad = document.getElementById("sad-img");
        const chatBox = document.getElementById("chat-box");

        // Configuration du modèle léger (Llama-3-8B-q4f16_1)
        async function initAI() {
            statusLabel.innerText = "Téléchargement du savoir (Veuillez patienter)...";
            engine = await webllm.CreateMLCEngine("Llama-3-8B-Instruct-v0.1-q4f16_1-MLC", {
                initProgressCallback: (p) => { statusLabel.innerText = "Éveil : " + Math.round(p.progress * 100) + "%"; }
            });
            statusLabel.innerText = "Genesis est prête.";
            eye.style.transform = "scaleY(1)"; // Elle ouvre l'œil quand elle est prête
        }

        window.sendMessage = async () => {
            const input = document.getElementById("user-input");
            const prompt = input.value;
            if (!prompt || !engine) return;

            input.value = "";
            chatBox.innerText = ". . .";

            const messages = [
                { role: "system", content: identity },
                { role: "user", content: prompt }
            ];

            const reply = await engine.chat.completions.create({ messages });
            const text = reply.choices[0].message.content;

            // Gestion des émotions visuelles
            if (text.includes("[Triste]")) sad.style.opacity = 1;
            else sad.style.opacity = 0;

            chatBox.innerText = text.replace(/\[.*?\]/g, ""); // Affiche le texte sans les balises
        };

        initAI();
    </script>
</body>
</html>
