<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Genesis - Divine Interface</title>
    <style>
        body { 
            margin: 0; background: #000; color: white; 
            font-family: 'Times New Roman', serif; overflow: hidden; 
            display: flex; flex-direction: column; height: 100vh; 
        }
        
        #eye-container { 
            flex: 0 0 45vh; display: flex; align-items: center; justify-content: center; 
        }

        #eye-img { 
            width: 250px; /* Taille optimale pour tes frames */
            height: auto;
            image-rendering: pixelated; /* Garde le côté net si c'est du pixel art */
        }

        #chat-wrapper {
            flex: 1; position: relative; overflow: hidden;
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }

        #chat-box { 
            height: 100%; padding: 0 40px; text-align: center; 
            font-style: italic; font-size: 1.2em; overflow-y: auto; 
            display: flex; align-items: center; justify-content: center;
            scrollbar-width: none; white-space: pre-wrap;
            line-height: 1.6;
        }

        #input-area { 
            padding: 20px; background: #000; border-top: 1px solid #111; 
            display: flex; gap: 10px; opacity: 0; transition: opacity 1s;
        }
        
        input { 
            flex: 1; background: #0a0a0a; border: 1px solid #222; color: white; 
            padding: 12px 20px; border-radius: 25px; outline: none; font-size: 16px;
        }

        button { background: #fff; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body onload="init()">

    <div id="eye-container">
        <img id="eye-img" src="assets/still.png">
    </div>

    <div id="chat-wrapper">
        <div id="chat-box"></div>
    </div>

    <form id="input-area" onsubmit="event.preventDefault(); sendMessage();">
        <input type="text" id="user-input" placeholder="Parle à l'entité..." autocomplete="off">
        <button type="submit">➔</button>
    </form>

    <script>
        const eye = document.getElementById("eye-img");
        const chatBox = document.getElementById("chat-box");
        const inputArea = document.getElementById("input-area");
        let API_KEY = localStorage.getItem("genesis_key");

        function setEye(path, isGif = false) {
            const timestamp = isGif ? `?t=${new Date().getTime()}` : '';
            eye.src = `assets/${path}${timestamp}`;
        }

        function init() {
            if (!API_KEY) {
                let key = prompt("Entre ta clé API Groq :");
                if (key) { localStorage.setItem("genesis_key", key); location.reload(); }
                return;
            }

            // Éveil de Genesis
            setEye("awake.gif", true);
            
            setTimeout(() => {
                setEye("still.png");
                chatBox.innerText = "Je suis éveillé. Que désires-tu savoir ?";
                inputArea.style.opacity = "1";
            }, 1000); // Ajuste selon la durée de ton awake.gif
        }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const promptValue = input.value;
            if (!promptValue) return;

            input.value = "";
            chatBox.innerText = ". . .";

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { role: "system", content: "Tu es Genesis, une entité divine et mystique. Réponds de façon courte et poétique. Tu DOIS impérativement commencer tes réponses par [Heureux] ou [Triste] selon ton humeur." },
                            { role: "user", content: promptValue }
                        ]
                    })
                });

                const data = await response.json();
                const text = data.choices[0].message.content;
                
                // Gestion de l'affichage du texte et des émotions
                let emotion = "neutre";
                if (text.includes("[Triste]")) emotion = "sad";
                if (text.includes("[Heureux]")) emotion = "happy";

                const cleanText = text.replace(/\[.*?\]/g, "").trim();

                if (emotion === "sad") {
                    setEye("sad/to_sad.gif", true);
                    setTimeout(() => setEye("sad/sad.png"), 1000);
                } else if (emotion === "happy") {
                    setEye("happy/to_happy.gif", true);
                    setTimeout(() => setEye("happy/happy.png"), 1000);
                }

                chatBox.innerText = cleanText;

                // Retour au neutre après 7 secondes
                setTimeout(() => {
                    if (emotion === "sad") {
                        setEye("sad/to_still.gif", true);
                        setTimeout(() => setEye("still.png"), 1000);
                    } else if (emotion === "happy") {
                        setEye("happy/to_still.gif", true);
                        setTimeout(() => setEye("still.png"), 1000);
                    }
                }, 7000);

            } catch (e) {
                chatBox.innerText = "Le lien est rompu... Vérifie ta connexion.";
            }
        }
    </script>
</body>
</html>
